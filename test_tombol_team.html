<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Tombol Team Member</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .team-member-item {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            background: white;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h2>Test Tombol Tambah & Hapus Anggota Tim</h2>
        
        <div class="card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <label>Anggota Tim</label>
                    <button type="button" class="btn btn-success btn-sm" onclick="addTeamMemberRow()">
                        <i class="fas fa-plus me-1"></i>Tambah Anggota
                    </button>
                </div>
                
                <div id="teamMembersList">
                    <!-- Default team members -->
                    <div class="team-member-item" data-member-index="0">
                        <div class="row align-items-start">
                            <div class="col-md-8">
                                <input type="text" class="form-control mb-2" placeholder="Nama Lengkap" value="Joko Susilo">
                                <input type="text" class="form-control mb-2" placeholder="Jabatan" value="Direktur Utama">
                            </div>
                            <div class="col-md-4">
                                <button type="button" class="btn btn-danger btn-sm remove-member w-100" onclick="removeTeamMemberRow(this)">
                                    <i class="fas fa-trash"></i> Hapus
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="team-member-item" data-member-index="1">
                        <div class="row align-items-start">
                            <div class="col-md-8">
                                <input type="text" class="form-control mb-2" placeholder="Nama Lengkap" value="Sari Wulandari">
                                <input type="text" class="form-control mb-2" placeholder="Jabatan" value="Manajer Produksi">
                            </div>
                            <div class="col-md-4">
                                <button type="button" class="btn btn-danger btn-sm remove-member w-100" onclick="removeTeamMemberRow(this)">
                                    <i class="fas fa-trash"></i> Hapus
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="mt-3">
                    <strong>Total Anggota: <span id="totalCount">2</span></strong>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global variable
        let teamMemberIndex = 2;

        // Add team member function
        function addTeamMemberRow() {
            console.log('addTeamMemberRow called');
            const container = document.getElementById('teamMembersList');
            const newRow = document.createElement('div');
            newRow.className = 'team-member-item';
            newRow.setAttribute('data-member-index', teamMemberIndex);
            
            newRow.innerHTML = `
                <div class="row align-items-start">
                    <div class="col-md-8">
                        <input type="text" class="form-control mb-2" placeholder="Nama Lengkap" value="">
                        <input type="text" class="form-control mb-2" placeholder="Jabatan" value="">
                    </div>
                    <div class="col-md-4">
                        <button type="button" class="btn btn-danger btn-sm remove-member w-100" onclick="removeTeamMemberRow(this)">
                            <i class="fas fa-trash"></i> Hapus
                        </button>
                    </div>
                </div>
            `;
            
            container.appendChild(newRow);
            teamMemberIndex++;
            updateTeamRemoveButtons();
            updateCount();
            
            console.log('Team member added. New count:', document.querySelectorAll('.team-member-item').length);
        }

        // Remove team member function
        function removeTeamMemberRow(button) {
            console.log('removeTeamMemberRow called');
            const rows = document.querySelectorAll('.team-member-item');
            
            if (rows.length > 1) {
                const row = button.closest('.team-member-item');
                row.remove();
                updateTeamRemoveButtons();
                updateCount();
                
                console.log('Team member removed. New count:', document.querySelectorAll('.team-member-item').length);
            } else {
                alert('Minimal harus ada satu anggota tim');
            }
        }

        // Update remove buttons visibility
        function updateTeamRemoveButtons() {
            const teamRows = document.querySelectorAll('.team-member-item');
            
            teamRows.forEach((row) => {
                const button = row.querySelector('.remove-member');
                if (button) {
                    button.style.display = teamRows.length > 1 ? 'block' : 'none';
                }
            });
            
            console.log('Remove buttons updated. Total members:', teamRows.length);
        }

        // Update count display
        function updateCount() {
            const count = document.querySelectorAll('.team-member-item').length;
            document.getElementById('totalCount').textContent = count;
        }

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', function() {
            console.log('Page loaded');
            updateTeamRemoveButtons();
            updateCount();
        });
    </script>
</body>
</html>
