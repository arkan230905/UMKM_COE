<!DOCTYPE html>
<html>
<head>
    <title>Test Update Function</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <h1>Test Update Function</h1>
    
    <input type="text" id="companyTitle" value="Tentang SIMCOST">
    <input type="text" id="companyDescription" value="Test description">
    <input type="text" id="companyEmail" value="eadt@gmail.com">
    <input type="text" id="companyPhone" value="08123456789">
    <input type="text" id="companyAddress" value="Jalan Telekomunikasi 1">
    
    <button type="button" id="updateCompanyInfoBtn" onclick="updateAllCompanyInfo()">
        Update Semua Perubahan
    </button>
    
    <meta name="csrf-token" content="test-token">
    
    <script>
        function updateAllCompanyInfo() {
            console.log('=== UPDATE ALL COMPANY INFO START ===');
            console.log('updateAllCompanyInfo() called');
            
            const updateBtn = document.getElementById('updateCompanyInfoBtn');
            console.log('Button element:', updateBtn);
            
            if (!updateBtn) {
                console.error('Button not found!');
                return;
            }
            
            const title = document.getElementById('companyTitle').value;
            const description = document.getElementById('companyDescription').value;
            const email = document.getElementById('companyEmail').value;
            const phone = document.getElementById('companyPhone').value;
            const address = document.getElementById('companyAddress').value;
            
            console.log('Form values:', { title, description, email, phone, address });
            
            const requestData = {
                nama: title.replace('Tentang ', ''),
                catalog_description: description,
                email: email,
                telepon: phone,
                alamat: address
            };
            
            console.log('Sending request:', requestData);
            
            fetch('/kelola-catalog/settings/company-info', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRF-TOKEN': document.querySelector('meta[name="csrf-token"]').getAttribute('content'),
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: JSON.stringify(requestData)
            })
            .then(response => {
                console.log('Response received:', response);
                console.log('Response status:', response.status);
                console.log('Response ok:', response.ok);
                return response.json();
            })
            .then(data => {
                console.log('Response data:', data);
                alert('Response: ' + JSON.stringify(data));
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error: ' + error.message);
            });
        }
    </script>
</body>
</html>
